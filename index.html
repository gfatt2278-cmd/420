<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>420 UFO Intro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
z-index:-1;
}

.logo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:280px;
cursor:pointer;
filter:
drop-shadow(0 0 15px #00ff66)
drop-shadow(0 0 40px #00ff66);
animation:pulse 2s infinite;
transition:.4s;
}

.logo:hover{
transform:translate(-50%,-50%) scale(1.08);
}

@keyframes pulse{

0%{
transform:translate(-50%,-50%) scale(1);
}

50%{
transform:translate(-50%,-50%) scale(1.05);
}

100%{
transform:translate(-50%,-50%) scale(1);
}

}

.text{
position:absolute;
bottom:140px;
width:100%;
text-align:center;
color:#9cff57;
font-size:28px;
font-weight:bold;
text-shadow:0 0 15px #00ff00;
}

.msg{
position:absolute;
bottom:95px;
width:100%;
text-align:center;
color:white;
font-size:18px;
}

.tap{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
color:#00ff66;
font-size:20px;
animation:blink 1s infinite;
}

@keyframes blink{

50%{
opacity:.2;
}

}
</style>

</head>

<body>

<video autoplay muted loop playsinline>

<source src="ufo.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<img src="420logo.png"
class="logo"
onclick="startIntro()">

<div class="text">
420 UFO DISCOVERY
</div>

<div class="msg">

Some mysteries are never meant to be found...<br>

But you were chosen.

</div>

<div class="tap">

TAP THE LOGO TO BEGIN

</div>

<script>

function startIntro(){

document.querySelector(".text").innerHTML="Loading Mission...";

document.querySelector(".msg").innerHTML="Searching Unknown Signal...";

document.querySelector(".tap").style.display="none";

setTimeout(function(){

alert("Part 2 မှာ UFO Story စပါမယ် 🚀");

},2000);

}

</script>

</body>
</html>
