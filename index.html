<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>420 UFO Intro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.35);
    z-index:0;
    pointer-events:none;
}

.logo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:280px;
    cursor:pointer;
    z-index:10;
    filter:
        drop-shadow(0 0 15px #00ff66)
        drop-shadow(0 0 40px #00ff66);
    animation:pulse 2s infinite;
    transition:.4s;
}

.text,.msg,.tap{
    z-index:10;
    position:absolute;
}
.logo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:280px;
    cursor:pointer;
    filter:
        drop-shadow(0 0 15px #00ff66)
        drop-shadow(0 0 40px #00ff66);
    animation:pulse 2s infinite;
    transition:.4s;
}

.logo:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

@keyframes pulse{
0%{
transform:translate(-50%,-50%) scale(1);
}
50%{
transform:translate(-50%,-50%) scale(1.05);
}
100%{
transform:translate(-50%,-50%) scale(1);
}
}

.text{
    position:absolute;
    bottom:140px;
    width:100%;
    text-align:center;
    color:#9cff57;
    font-size:28px;
    font-weight:bold;
    text-shadow:0 0 15px #00ff00;
}

.msg{
    position:absolute;
    bottom:95px;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:18px;
}

.tap{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    color:#00ff66;
    font-size:20px;
    animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.2;
}
}

#story{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    text-align:center;
    color:white;
    font-size:30px;
    line-height:55px;
    text-shadow:0 0 20px #00ff66;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="ufo.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
<div class="overlay"></div>

<img
    src="420logo.png"
    alt="420 Logo"
    class="logo"
    onclick="startIntro()">
<div class="text">
420 UFO DISCOVERY
</div>

<div class="msg">
Some mysteries are never meant to be found...
<br><br>
But you were chosen.
</div>

<div class="tap">
TAP THE LOGO TO BEGIN
</div>

<script>

function startIntro(){

document.querySelector(".text").style.display="none";
document.querySelector(".msg").style.display="none";
document.querySelector(".tap").style.display="none";

let logo=document.querySelector(".logo");

logo.style.transition="2s";
logo.style.transform="translate(-50%,-50%) scale(1.6)";
logo.style.filter="drop-shadow(0 0 80px #00ff66)";

setTimeout(function(){

document.body.style.background="#fff";

setTimeout(function(){

document.body.style.background="#000";

showStory();

},300);

},1800);

}

function showStory(){

document.querySelector(".logo").style.display="none";

document.body.innerHTML += `
<div id="story">
🛸 UNKNOWN SIGNAL DETECTED...
<br><br>
A strange light appeared in the sky...
<br><br>
Someone decided to follow it...
<br><br>
Searching...
</div>
`;

setTimeout(scene2,5000);

}

function scene2(){

document.getElementById("story").innerHTML=`
🌌 The signal became stronger...
<br><br>
Three UFOs appeared above the forest.
<br><br>
MISSION STARTED
`;

setTimeout(scene3,5000);

}

function scene3(){

document.getElementById("story").innerHTML=`
🚶
<br><br>
A lonely traveler entered the forest...
<br><br>
Looking for the mysterious
420 Logo...
`;

setTimeout(scene4,5000);

}

function scene4(){

document.getElementById("story").innerHTML=`
✨
<br><br>
MISSION COMPLETE
<br><br>
The 420 Logo has been found.
<br><br><br>

<button onclick="location.reload()" style="
padding:18px 45px;
font-size:22px;
background:#00ff66;
color:black;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 20px #00ff66;
">
PLAY AGAIN
</button>
`;

}

</script>

</body>
</html>
