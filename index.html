<!DOCTYPE html>
<html lang="en">
<head>

    <title>TEAM 420</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;

        }
        .container {

            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .section-title {
            color: #4CAF50;
            font-size: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
            margin-top: 25px;
            text-align: left;
        }
        .meaning-box {
            text-align: left;
            line-height: 1.6;
            color: #dddddd;
            font-size: 15px;
        .stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    background-image:
        radial-gradient(white 1px,transparent 1px),
        radial-gradient(#00ff99 1px,transparent 1px);
    background-size:70px 70px,140px 140px;
    animation:starsMove 60s linear infinite;
    opacity:.35;
}
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background-image:
radial-gradient(white 1px,transparent 1px),
radial-gradient(#00ff99 1px,transparent 1px);
background-size:70px 70px,140px 140px;
animation:starsMove 60s linear infinite;
opacity:.35;
}

@keyframes starsMove{
from{
transform:translateY(0);
}
to{

}

body{
background:#050816;
color:white;

margin:0;
}

.hero{
text-align:center;

}

.hero h1{
font-size:60px;
color:#00ff99;

}

.btn{

.features{

.card:hover{
