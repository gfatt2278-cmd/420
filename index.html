<!DOCTYPE html>
<html>
<head>
    <title>TEAM 420</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TEAM 420</h1>
    <p>Welcome to TEAM 420 Official Website!</p>

    <!-- ၁။ ပုံ (Image) ထည့်ရန်နေရာ -->
    <div class="image-section">
        <h2>Our Image</h2>
        <!-- သင့်မှာရှိတဲ့ ပုံဖိုင်အမည် (ဥပမာ- photo.jpg) ကို src မှာ ပြောင်းထည့်ပါ -->
        <img src="my-team.jpg" alt="TEAM 420 Photo" width="500">
    </div>

    <!-- ၂။ ဗီဒီယို (Video) ထည့်ရန်နေရာ -->
    <div class="video-section">
        <h2>Our Video</h2>
        
        <!-- နည်းလမ်း (က) - သင့်ဆီမှာရှိတဲ့ ဗီဒီယိုဖိုင် (ဥပမာ- movie.mp4) ကို တိုက်ရိုက်ထည့်နည်း -->
        <video width="500" controls>
            <source src="movie.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <!-- နည်းလမ်း (ခ) - တကယ်လို့ YouTube ဗီဒီယို ပြချင်ရင် အောက်က ကုဒ်မျိုး သုံးနိုင်ပါတယ် (Embed Code) -->
        <!-- 
        <iframe width="560" height="315" src="https://www.youtube.com/embed/ဗီဒီယိုကုဒ်" frameborder="0" allowfullscreen></iframe> 
        -->
    </div>

</body>
</html>
