<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM 420 ULTIMATE</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:black;
    color:white;
    overflow:hidden;
}

/* ================= LOADING ================= */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    animation:hideLoader 3s ease 3s forwards;
}
#loader h1{
    color:#00ff99;
    text-shadow:0 0 20px #00ff99;
}
@keyframes hideLoader{
    to{opacity:0;visibility:hidden;}
}

/* ================= PRESS START ================= */
#startScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle,#001a1a,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:998;
}
#startBtn{
    padding:18px 40px;
    font-size:20px;
    background:linear-gradient(45deg,#00ff99,#00ccff);
    border:none;
    border-radius:40px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 25px #00ff99;
}
#startBtn:hover{
    transform:scale(1.1);
}

/* ================= GALAXY BACKGROUND ================= */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:
        radial-gradient(white 1px,transparent 1px),
        radial-gradient(#00ff99 1px,transparent 1px),
        radial-gradient(#00ccff 1px,transparent 1px);
    background-size:80px 80px,140px 140px,200px 200px;
    animation:moveStars 80s linear infinite;
    opacity:0.25;
    z-index:0;
}
@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(-1200px);}
}

/* ================= UFO ================= */
.ufo{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    width:130px;
    animation:floating 3s ease-in-out infinite;
    filter:drop-shadow(0 0 15px #00ff99);
    z-index:3;
}
@keyframes floating{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(20px);}
}

/* BEAM */
.beam{
    position:absolute;
    top:100px;
    left:50%;
    transform:translateX(-50%);
    width:140px;
    height:220px;
    background:linear-gradient(to bottom, rgba(0,255,153,0.6), transparent);
    clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);
    animation:pulse 1.2s infinite alternate;
}
@keyframes pulse{
    from{opacity:0.3;}
    to{opacity:0.9;}
}

/* ================= CONTAINER ================= */
.container{
    position:relative;
    z-index:2;
    max-width:650px;
    margin:auto;
    padding:20px;
    text-align:center;
}

/* LOGO */
.logo{
    width:75%;
    border-radius:15px;
    box-shadow:0 0 30px #00ff99;
}

/* TITLE */
h1{
    color:#00ff99;
    text-shadow:0 0 20px #00ff99;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:20px;
    padding:15px 30px;
    background:linear-gradient(45deg,#00ff99,#00ccff);
    color:black;
    font-weight:bold;
    border-radius:30px;
    text-decoration:none;
    box-shadow:0 0 25px #00ff99;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.1);
}

/* PLAY STORE CARD */
.card{
    margin-top:25px;
    background:#111;
    padding:15px;
    border-radius:15px;
    text-align:left;
    box-shadow:0 0 15px #00ff99;
}

/* SOUND BUTTON */
.soundBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:10px 15px;
    border-radius:50px;
    background:#00ff99;
    color:black;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
    <h1>TEAM 420 LOADING...</h1>
</div>

<!-- START SCREEN -->
<div id="startScreen">
    <h1 style="color:#00ff99;text-shadow:0 0 20px #00ff99;">TEAM 420</h1>
    <button id="startBtn">PRESS START</button>
</div>

<!-- BACKGROUND -->
<div class="stars"></div>
