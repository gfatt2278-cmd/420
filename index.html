<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEAM 420 | UFO INTRO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

/* VIDEO */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:-2;
}

/* STAR LAYER */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

/* START SCREEN */

#startScreen{

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

}

/* LOGO */

#logo{

width:280px;
cursor:pointer;
user-select:none;

filter:
drop-shadow(0 0 20px #00ff66)
drop-shadow(0 0 40px #00ff66);

transition:.4s;

}

/* TITLE */

h1{

margin-top:25px;

font-size:42px;

color:#8eff55;

letter-spacing:3px;

text-shadow:
0 0 20px #00ff66;

}

/* DESCRIPTION */

#desc{

margin-top:20px;

width:80%;
max-width:700px;

font-size:22px;
line-height:38px;

color:white;

}

/* TAP */

#tap{

margin-top:45px;

font-size:24px;

color:#00ff66;

}

/* STORY */

#story{

display:none;

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

max-width:900px;

text-align:center;

font-size:34px;

line-height:60px;

color:white;

text-shadow:
0 0 15px #00ff66;

}

button{

padding:18px 45px;

font-size:22px;

border:none;

border-radius:12px;

background:#00ff66;

color:black;

font-weight:bold;

cursor:pointer;

margin-top:40px;

}

</style>

</head>

<body>

<!-- BACKGROUND VIDEO -->

<video autoplay muted loop playsinline>

<source src="ufo.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<canvas id="stars"></canvas>

<!-- START -->

<div id="startScreen">

<img
id="logo"
src="420logo.png"
alt="TEAM 420"
onclick="startIntro()">

<h1>TEAM 420</h1>

<div id="desc">

Some mysteries were never meant to be discovered...

<br><br>

Tonight...

YOU were chosen.

</div>

<div id="tap">

🛸 TAP THE LOGO TO BEGIN

</div>

</div>

<!-- STORY -->

<div id="story"></div>

<!-- AUDIO -->

<audio id="introMusic" src="intro.mp3"></audio>

<audio id="clickSound" src="click.mp3"></audio>

<script>
    // JavaScript Code
</script>

</body>
</html>
